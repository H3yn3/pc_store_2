<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход в админку</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="section">
    <div class="container form-layout">
      <div>
        <p class="badge">Admin</p>
        <h1>Вход в админ-панель</h1>
        <p>Доступ разрешён только администратору. Логин и пароль берутся из серверного `.env` файла.</p>
      </div>

      <form class="form" id="loginForm">
        <input type="text" name="login" placeholder="Логин администратора" required />
        <input type="password" name="password" placeholder="Пароль" required />
        <button class="btn" type="submit">Войти</button>
        <p class="form-note" id="loginMessage"></p>
      </form>
    </div>
  </main>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      const formData = new FormData(event.target);

      const response = await fetch("/api/admin/login", {
        method: "POST",
        body: new URLSearchParams(formData)
      });

      const result = await response.json();

      if (result.success) {
        window.location.href = "/admin";
      } else {
        document.getElementById("loginMessage").textContent =
          result.error || "Ошибка входа";
      }
    });
  </script>
</body>
</html>

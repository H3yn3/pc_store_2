<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">Компьютерный Магазин</a>
      <nav class="nav">
        <a href="/">На сайт</a>
        <button class="btn btn-small" id="logoutButton">Выйти</button>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <p class="badge">Admin</p>
      <h1>Управление товарами</h1>
      <p>Здесь можно добавлять, редактировать, удалять товары и менять фотографии.</p>

      <form class="form" id="productForm" enctype="multipart/form-data">
        <input type="hidden" name="id" id="productId" />

        <input type="text" name="name" id="productName" placeholder="Название товара" required />
        <textarea name="description" id="productDescription" placeholder="Описание товара" required></textarea>
        <input type="text" name="price" id="productPrice" placeholder="Цена" required />
        <input type="file" name="image" id="productImage" accept="image/png,image/jpeg,image/webp" />

        <button class="btn" type="submit" id="saveButton">Добавить товар</button>
        <button class="btn btn-outline" type="button" id="resetButton">Сбросить</button>

        <p class="form-note" id="adminMessage"></p>
      </form>

      <div class="catalog" id="adminProducts"></div>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
</body>
</html>
